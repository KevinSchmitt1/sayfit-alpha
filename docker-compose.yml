services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data/sayfit_meals.db:/app/data/sayfit_meals.db
      - ./data/faiss_index:/app/data/faiss_index:ro

  prometheus:
    image: prom/prometheus
    ports: 
      - "9090:9090"
    depends_on:
      - api
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
  
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana



volumes:
  grafana_data:
  prometheus_data:
